[package]
name = "web3action"
version = "0.1.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
serde_json = "1.0.108"
anyhow = "1.0.77"
log = { version = "0.4.20", features = ["release_max_level_info"] }
env_logger = "0.10.1"
dotenvy = "0.15.7"
once_cell = "1.19.0"
chrono = { version = "0.4.31", features = ["serde"] }
tokio = { version = "1.35.1", features = ["full"] }
ethers = { version = "2.0.11", features = ["legacy"] }

[build-dependencies]
ethers = { version = "2.0.11", features = ["legacy"] }

[profile.release]
lto = true
strip = true
codegen-units = 1
